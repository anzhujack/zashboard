<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS 查询统计 - sing-box</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-card .label {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }
        .stat-card.success .value {
            color: #10b981;
        }
        .stat-card.failed .value {
            color: #ef4444;
        }
        .stat-card.avg .value {
            color: #3b82f6;
        }
        .section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th {
            background: #f9fafb;
            color: #666;
            font-weight: 600;
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 13px;
        }
        .table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .table tr:hover {
            background: #f9fafb;
        }
        .rcode-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .rcode-badge.success {
            background: #d1fae5;
            color: #065f46;
        }
        .rcode-badge.error {
            background: #fee2e2;
            color: #991b1b;
        }
        .rcode-badge.other {
            background: #fef3c7;
            color: #92400e;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        button.danger {
            background: #ef4444;
        }
        button.danger:hover {
            background: #dc2626;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .chart-container {
            margin-top: 15px;
            height: 300px;
        }
        .bar {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .bar-label {
            width: 150px;
            font-size: 13px;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .bar-value {
            flex: 1;
            height: 24px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            margin: 0 10px;
            position: relative;
        }
        .bar-count {
            width: 50px;
            text-align: right;
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 DNS 查询统计</h1>
            <p>实时监控 DNS 查询活动，类似 AdGuardHome 仪表盘</p>
        </div>

        <div id="error" class="error" style="display:none;"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">总查询数</div>
                <div class="value" id="total-queries">-</div>
            </div>
            <div class="stat-card success">
                <div class="label">成功查询</div>
                <div class="value" id="success-queries">-</div>
            </div>
            <div class="stat-card failed">
                <div class="label">失败查询</div>
                <div class="value" id="failed-queries">-</div>
            </div>
            <div class="stat-card avg">
                <div class="label">平均延迟</div>
                <div class="value" id="avg-latency">-</div>
            </div>
            <div class="stat-card">
                <div class="label">运行时间</div>
                <div class="value" id="uptime">-</div>
            </div>
        </div>

        <div class="section">
            <h2>Top 10 域名</h2>
            <div id="top-domains" class="chart-container"></div>
        </div>

        <div class="section">
            <h2>Top 5 DNS 服务器</h2>
            <div id="top-transports" class="chart-container"></div>
        </div>

        <div class="section">
            <h2>响应码分布</h2>
            <div id="rcode-stats"></div>
        </div>

        <div class="section">
            <h2>查询类型分布</h2>
            <div id="qtype-stats"></div>
        </div>

        <div class="section">
            <h2>最近查询</h2>
            <div class="controls">
                <button onclick="refreshData()">🔄 刷新</button>
                <button class="danger" onclick="clearStats()">🗑️ 清空统计</button>
            </div>
            <div id="queries-table"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/dns/stats';
        let autoRefreshInterval;

        async function fetchData() {
            try {
                const [summaryRes, queriesRes] = await Promise.all([
                    fetch(`${API_BASE}/summary`),
                    fetch(`${API_BASE}/queries?limit=50`)
                ]);

                if (!summaryRes.ok || !queriesRes.ok) {
                    throw new Error('API 请求失败');
                }

                const summary = await summaryRes.json();
                const queriesData = await queriesRes.json();

                updateStats(summary);
                updateQueries(queriesData.queries || []);
                document.getElementById('error').style.display = 'none';
            } catch (err) {
                showError(err.message);
            }
        }

        function updateStats(summary) {
            document.getElementById('total-queries').textContent = summary.total_queries || 0;
            document.getElementById('success-queries').textContent = summary.success_queries || 0;
            document.getElementById('failed-queries').textContent = summary.failed_queries || 0;
            document.getElementById('avg-latency').textContent = (summary.avg_latency_ms || 0) + ' ms';
            document.getElementById('uptime').textContent = formatUptime(summary.uptime_seconds || 0);

            // Top domains
            const topDomainsHtml = (summary.top_domains || []).map(d => `
                <div class="bar">
                    <div class="bar-label" title="${d.domain}">${d.domain}</div>
                    <div class="bar-value" style="width: ${(d.count / (summary.top_domains[0]?.count || 1)) * 100}%"></div>
                    <div class="bar-count">${d.count}</div>
                </div>
            `).join('');
            document.getElementById('top-domains').innerHTML = topDomainsHtml || '<div class="empty">暂无数据</div>';

            // Top transports
            const topTransportsHtml = (summary.top_transports || []).map(t => `
                <div class="bar">
                    <div class="bar-label">${t.transport}</div>
                    <div class="bar-value" style="width: ${(t.count / (summary.top_transports[0]?.count || 1)) * 100}%"></div>
                    <div class="bar-count">${t.count}</div>
                </div>
            `).join('');
            document.getElementById('top-transports').innerHTML = topTransportsHtml || '<div class="empty">暂无数据</div>';

            // Rcode stats
            const rcodeHtml = Object.entries(summary.rcode_stats || {}).map(([rcode, count]) => {
                const badgeClass = rcode === 'NOERROR' ? 'success' : (rcode.includes('ERR') ? 'error' : 'other');
                return `<span class="rcode-badge ${badgeClass}">${rcode}: ${count}</span>`;
            }).join(' ');
            document.getElementById('rcode-stats').innerHTML = rcodeHtml || '<div class="empty">暂无数据</div>';

            // Qtype stats
            const qtypeHtml = Object.entries(summary.qtype_stats || {}).map(([qtype, count]) => {
                return `<span class="rcode-badge other">${qtype}: ${count}</span>`;
            }).join(' ');
            document.getElementById('qtype-stats').innerHTML = qtypeHtml || '<div class="empty">暂无数据</div>';
        }

        function updateQueries(queries) {
            if (!queries || queries.length === 0) {
                document.getElementById('queries-table').innerHTML = '<div class="empty">暂无查询记录</div>';
                return;
            }

            const tableHtml = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>域名</th>
                            <th>类型</th>
                            <th>响应码</th>
                            <th>DNS 服务器</th>
                            <th>延迟 (ms)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${queries.map(q => `
                            <tr>
                                <td>${new Date(q.timestamp).toLocaleTimeString()}</td>
                                <td>${q.domain}</td>
                                <td>${q.qtype}</td>
                                <td><span class="rcode-badge ${q.rcode === 'NOERROR' ? 'success' : 'error'}">${q.rcode}</span></td>
                                <td>${q.transport}</td>
                                <td>${q.latency_ms}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('queries-table').innerHTML = tableHtml;
        }

        function formatUptime(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            if (days > 0) return `${days}d ${hours}h`;
            if (hours > 0) return `${hours}h ${mins}m`;
            return `${mins}m`;
        }

        function showError(msg) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = '❌ ' + msg;
            errorEl.style.display = 'block';
        }

        async function refreshData() {
            await fetchData();
        }

        async function clearStats() {
            if (!confirm('确定要清空所有统计数据吗？')) return;
            try {
                const res = await fetch(`${API_BASE}/`, { method: 'DELETE' });
                if (res.ok) {
                    await fetchData();
                    alert('统计数据已清空');
                }
            } catch (err) {
                showError(err.message);
            }
        }

        // 初始化
        fetchData();
        autoRefreshInterval = setInterval(fetchData, 2000); // 每 2 秒刷新一次
    </script>
</body>
</html>
